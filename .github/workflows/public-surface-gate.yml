name: Public surface gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out exact revision
        uses: actions/checkout@v4
      - name: Verify bounded public tree
        run: python3 tools/verify_public_surface.py
