<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Public Consequence Cut</title>
  <desc id="desc">A static public-surface plate separating proposals from bounded software verdicts.</desc>
  <rect width="1200" height="300" rx="28" fill="#0a0b0f"/>
  <circle cx="1035" cy="66" r="88" fill="#ff3ca6" opacity="0.95"/>
  <circle cx="1125" cy="248" r="44" fill="#ffd83d" opacity="0.95"/>
  <circle cx="915" cy="248" r="31" fill="#29f0d0" opacity="0.95"/>
  <path d="M62 244 C225 244 280 78 500 78 S690 220 810 220" fill="none" stroke="#29f0d0" stroke-width="8"/>
  <path d="M62 244 C260 244 350 148 520 148 S700 230 810 230" fill="none" stroke="#ffd83d" stroke-width="5" stroke-dasharray="12 13"/>
  <path d="M62 244 C300 244 390 205 550 205 S710 240 810 240" fill="none" stroke="#ff3ca6" stroke-width="4" stroke-dasharray="4 13"/>
  <rect x="52" y="42" width="770" height="128" rx="18" fill="#0a0b0f" stroke="#f7f7f2" stroke-width="2"/>
  <text x="82" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="48" font-weight="900" fill="#f7f7f2">PUBLIC CONSEQUENCE CUT</text>
  <text x="85" y="135" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="800" fill="#29f0d0">PROPOSE / REVIEW / NOTHING CROSSES SILENTLY</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" font-weight="900" text-anchor="middle">
    <rect x="842" y="190" width="103" height="56" rx="10" fill="#29f0d0"/>
    <text x="893" y="225" fill="#0a0b0f">OPEN</text>
    <rect x="958" y="190" width="103" height="56" rx="10" fill="#ffd83d"/>
    <text x="1009" y="225" fill="#0a0b0f">HOLD</text>
    <rect x="1074" y="190" width="82" height="56" rx="10" fill="#ff3ca6"/>
    <text x="1115" y="225" fill="#0a0b0f">KILL</text>
  </g>
</svg>
