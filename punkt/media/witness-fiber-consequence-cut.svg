<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Witness Fiber Consequence Cut</title>
  <desc id="desc">A static public-surface artwork showing synthetic witness traces converging on an Omega admission gate before bounded OPEN, HOLD, or KILL software verdicts.</desc>

  <rect width="1200" height="320" rx="28" fill="#0a0b0f"/>

  <!-- Header plate -->
  <rect x="48" y="34" width="720" height="112" rx="18" fill="#0a0b0f" stroke="#f7f7f2" stroke-width="2"/>
  <text x="78" y="82" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="900" fill="#f7f7f2">WITNESS FIBER COLLAPSE</text>
  <text x="80" y="119" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="800" fill="#29f0d0">PUBLIC TRACE / ADMISSION / NOTHING CROSSES SILENTLY</text>

  <!-- Decorative fixed points -->
  <circle cx="1060" cy="64" r="76" fill="#ff3ca6" opacity="0.95"/>
  <circle cx="1140" cy="274" r="34" fill="#ffd83d" opacity="0.95"/>
  <circle cx="936" cy="278" r="25" fill="#29f0d0" opacity="0.95"/>

  <!-- Synthetic witness fibers -->
  <path d="M62 252 C220 252 284 172 430 172 S600 230 690 230" fill="none" stroke="#29f0d0" stroke-width="8" stroke-linecap="round"/>
  <path d="M62 264 C236 264 326 205 454 205 S612 238 690 238" fill="none" stroke="#ffd83d" stroke-width="5" stroke-dasharray="13 13" stroke-linecap="round"/>
  <path d="M62 276 C252 276 350 239 480 239 S624 247 690 247" fill="none" stroke="#ff3ca6" stroke-width="4" stroke-dasharray="3 13" stroke-linecap="round"/>

  <!-- Witness packets: synthetic public labels only -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="800">
    <rect x="156" y="224" width="62" height="28" rx="6" fill="#10141a" stroke="#29f0d0"/>
    <text x="187" y="243" text-anchor="middle" fill="#29f0d0">W:001</text>

    <rect x="304" y="190" width="62" height="28" rx="6" fill="#10141a" stroke="#ffd83d"/>
    <text x="335" y="209" text-anchor="middle" fill="#ffd83d">W:002</text>

    <rect x="474" y="224" width="62" height="28" rx="6" fill="#10141a" stroke="#ff3ca6"/>
    <text x="505" y="243" text-anchor="middle" fill="#ff3ca6">W:003</text>
  </g>

  <!-- Omega admission gate -->
  <circle cx="734" cy="238" r="46" fill="#10141a" stroke="#f7f7f2" stroke-width="3"/>
  <circle cx="734" cy="238" r="35" fill="none" stroke="#29f0d0" stroke-width="3" stroke-dasharray="5 7"/>
  <text x="734" y="251" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="38" font-weight="900" fill="#f7f7f2">Ω</text>
  <text x="734" y="303" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="800" fill="#8b949e">ADMISSION CUT</text>

  <!-- Consequence line -->
  <path d="M780 238 H828" fill="none" stroke="#f7f7f2" stroke-width="3"/>
  <path d="M818 230 L830 238 L818 246" fill="none" stroke="#f7f7f2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bounded public verdicts -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" font-weight="900" text-anchor="middle">
    <rect x="842" y="188" width="102" height="56" rx="10" fill="#29f0d0"/>
    <text x="893" y="223" fill="#0a0b0f">OPEN</text>

    <rect x="958" y="188" width="102" height="56" rx="10" fill="#ffd83d"/>
    <text x="1009" y="223" fill="#0a0b0f">HOLD</text>

    <rect x="1074" y="188" width="82" height="56" rx="10" fill="#ff3ca6"/>
    <text x="1115" y="223" fill="#0a0b0f">KILL</text>
  </g>

  <text x="999" y="164" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" font-weight="800" fill="#f7f7f2">CANDIDATE != CONSEQUENCE</text>
  <text x="999" y="263" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" font-weight="700" fill="#8b949e">STATIC PUBLIC VISUALIZATION / NO PHYSICAL AUTHORITY</text>
</svg>
